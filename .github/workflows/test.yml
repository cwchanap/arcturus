name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cwchanap/arcturus
          files: ./coverage/lcov.info
          disable_search: true
          report_type: coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}

      - name: Capture Codecov processing state
        if: always()
        shell: bash
        env:
          CODECOV_COMMIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          : > codecov-processing.log
          for attempt in 1 2 3 4 5 6; do
            status=$(curl --silent --show-error \
              --output codecov-commit-response.json \
              --write-out '%{http_code}' \
              "https://api.codecov.io/api/v2/github/cwchanap/repos/arcturus/commits/${CODECOV_COMMIT}/" || true)
            printf 'attempt=%s http_status=%s\n' "$attempt" "$status" >> codecov-processing.log
            if [ "$status" = '200' ]; then
              break
            fi
            sleep 5
          done

      - name: Archive coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            codecov-processing.log
            codecov-commit-response.json
          retention-days: 30
