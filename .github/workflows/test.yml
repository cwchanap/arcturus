name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format reviewed files for diagnostics
        run: >-
          bunx prettier --write
          .github/workflows/test.yml
          e2e/keno.spec.ts
          src/lib/keno/DrawManager.test.ts
          src/lib/keno/KenoGame.test.ts
          src/lib/keno/KenoUIRenderer.ts
          src/lib/keno/outbox.ts
          src/lib/keno/payoutCalculator.test.ts
          src/lib/keno/review-regressions.test.ts

      - name: Archive formatted review files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-review-files
          path: |
            .github/workflows/test.yml
            e2e/keno.spec.ts
            src/lib/keno/DrawManager.test.ts
            src/lib/keno/KenoGame.test.ts
            src/lib/keno/KenoUIRenderer.ts
            src/lib/keno/outbox.ts
            src/lib/keno/payoutCalculator.test.ts
            src/lib/keno/review-regressions.test.ts
          retention-days: 1

      - name: Run unit tests
        run: bun run test:unit

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cwchanap/arcturus
          files: ./coverage/lcov.info
          disable_search: true
          report_type: coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_pr: ${{ github.event.pull_request.number }}

      - name: Archive coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
